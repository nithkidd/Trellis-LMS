<svg xmlns="http://www.w3.org/2000/svg" viewBox="90 30 330 280">
  <!-- Trellis Pattern (Navy Blue) -->
  <g id="trellis">
    <line x1="180" y1="100" x2="220" y2="60" stroke="#001F3F" stroke-width="20" stroke-linecap="round"/>
    <line x1="220" y1="60" x2="260" y2="100" stroke="#001F3F" stroke-width="20" stroke-linecap="round"/>
    <line x1="260" y1="100" x2="300" y2="60" stroke="#001F3F" stroke-width="20" stroke-linecap="round"/>
    <line x1="300" y1="60" x2="340" y2="100" stroke="#001F3F" stroke-width="20" stroke-linecap="round"/>
    
    <line x1="150" y1="130" x2="190" y2="90" stroke="#001F3F" stroke-width="20" stroke-linecap="round"/>
    <line x1="190" y1="90" x2="230" y2="130" stroke="#001F3F" stroke-width="20" stroke-linecap="round"/>
    <line x1="230" y1="130" x2="270" y2="90" stroke="#001F3F" stroke-width="20" stroke-linecap="round"/>
    <line x1="270" y1="90" x2="310" y2="130" stroke="#001F3F" stroke-width="20" stroke-linecap="round"/>
    <line x1="310" y1="130" x2="350" y2="90" stroke="#001F3F" stroke-width="20" stroke-linecap="round"/>
    <line x1="350" y1="90" x2="390" y2="130" stroke="#001F3F" stroke-width="20" stroke-linecap="round"/>
    
    <line x1="130" y1="160" x2="170" y2="120" stroke="#001F3F" stroke-width="20" stroke-linecap="round"/>
    <line x1="170" y1="120" x2="210" y2="160" stroke="#001F3F" stroke-width="20" stroke-linecap="round"/>
    <line x1="210" y1="160" x2="250" y2="120" stroke="#001F3F" stroke-width="20" stroke-linecap="round"/>
    <line x1="250" y1="120" x2="290" y2="160" stroke="#001F3F" stroke-width="20" stroke-linecap="round"/>
    <line x1="290" y1="160" x2="330" y2="120" stroke="#001F3F" stroke-width="20" stroke-linecap="round"/>
    <line x1="330" y1="120" x2="370" y2="160" stroke="#001F3F" stroke-width="20" stroke-linecap="round"/>
  </g>
  
  <!-- Plant/Leaf (Green) -->
  <g id="plant">
    <!-- Stem -->
    <path d="M 256 180 Q 255 220, 256 280" stroke="#22C55E" stroke-width="12" fill="none" stroke-linecap="round"/>
    
    <!-- Left Leaf -->
    <ellipse cx="220" cy="220" rx="35" ry="50" fill="#22C55E" transform="rotate(-45 220 220)"/>
    <path d="M 220 190 Q 225 220, 220 250" stroke="white" stroke-width="3" fill="none"/>
    
    <!-- Right Leaf -->
    <ellipse cx="292" cy="220" rx="35" ry="50" fill="#22C55E" transform="rotate(45 292 220)"/>
    <path d="M 292 190 Q 287 220, 292 250" stroke="white" stroke-width="3" fill="none"/>
  </g>
  
</svg>